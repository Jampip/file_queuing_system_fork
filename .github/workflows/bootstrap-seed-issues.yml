name: Bootstrap Seed Issues

# Repeatable workflow to create issues for awaiting-review-2 items that don't
# yet have a tracking issue. It can be run manually, and it also auto-runs when
# awaiting-review-2 items are added or changed on main.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'reviews/awaiting-review-2/**'

permissions:
  issues: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues for unseeded review items
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const stages = [
              { dir: 'reviews/awaiting-review-2', label: 'awaiting-review-2' },
            ];

            // Pull all issues once so we can dedupe by path marker.
            // Older seeded issues used a folder marker, so support both.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo, state: 'all', per_page: 100,
            });
            const seeded = new Set(
              existing
                .flatMap(i => {
                  const body = i.body || '';
                  const markers = [];
                  const folderMatch = body.match(/<!--\s*folder:\s*(.+?)\s*-->/);
                  const pathMatch = body.match(/<!--\s*path:\s*(.+?)\s*-->/);
                  if (folderMatch) markers.push(folderMatch[1]);
                  if (pathMatch) markers.push(pathMatch[1]);
                  return markers;
                })
                .filter(Boolean)
            );

            for (const { dir, label } of stages) {
              if (!fs.existsSync(dir)) continue;
              for (const name of fs.readdirSync(dir)) {
                if (name.startsWith('.')) continue;

                const itemPath = `${dir}/${name}`;
                const stat = fs.statSync(itemPath);
                const isDirectory = stat.isDirectory();

                if (seeded.has(itemPath)) {
                  core.info(`already seeded: ${itemPath}`);
                  continue;
                }

                // Read DOI/URL from metadata.yml when this queue item is a folder.
                let doi = '(unknown)';
                let reviewer1 = '(unknown)';
                let title = '(unknown)';
                let curator = '(unknown)';
                let pathogen = '(unknown)';
                let figure = '(unknown)';
                let outcome = '(unknown)';
                let notes = '(unknown)';
                const metaPath = `${itemPath}/metadata.yml`;
                if (isDirectory && fs.existsSync(metaPath)) {
                  const yml = fs.readFileSync(metaPath, 'utf8');
                  doi = (yml.match(/^doi:\s*(.+)$/m) || [])[1] || doi;
                  reviewer1 = (yml.match(/^reviewer_1:\s*(.+)$/m) || [])[1] || reviewer1;
                } else if (isDirectory) {
                  // Fallback: extract from notebook
                  const files = fs.readdirSync(itemPath);
                  const notebookFile = files.find(f => f.endsWith('.ipynb'));
                  if (notebookFile) {
                    try {
                      const notebookPath = path.join(itemPath, notebookFile);
                      const notebook = JSON.parse(fs.readFileSync(notebookPath, 'utf8'));
                      const firstMarkdownCell = notebook.cells && notebook.cells.find(cell => cell.cell_type === 'markdown');
                      if (firstMarkdownCell) {
                        let source = firstMarkdownCell.source;
                        if (Array.isArray(source)) {
                          source = source.join('');
                        } else if (typeof source !== 'string') {
                          source = '';
                        }
                        const lines = source.split('\n');
                        for (const line of lines) {
                          const match = line.match(/^(\w+):\s*(.+)$/);
                          if (match) {
                            const field = match[1];
                            const value = match[2];
                            if (field === 'DOI') doi = value;
                            else if (field === 'Title') title = value;
                            else if (field === 'Curator') curator = value;
                            else if (field === 'Pathogen') pathogen = value;
                            else if (field === 'Figure') figure = value;
                            else if (field === 'Outcome') outcome = value;
                            else if (field === 'Notes') notes = value;
                          }
                        }
                      }
                    } catch (e) {
                      // Ignore parsing errors
                    }
                  }
                }

                const manuscriptName = isDirectory ? name : path.parse(name).name;
                const itemLabel = isDirectory ? 'Folder' : 'File';
                const reviewerLine = reviewer1 === '(unknown)'
                  ? '**First reviewer:** (not recorded in metadata yet)'
                  : `**First reviewer:** @${reviewer1}`;
                const claimLine = reviewer1 === '(unknown)'
                  ? 'A reviewer can claim it by commenting `/checkout` below.'
                  : `A second reviewer (anyone except @${reviewer1}) can claim it by commenting \`/checkout\` below.`;

                const bodyLines = [
                  `**Manuscript:** ${manuscriptName}`,
                  `**DOI:** ${doi}`,
                ];
                if (title !== '(unknown)') bodyLines.push(`**Title:** ${title}`);
                if (curator !== '(unknown)') bodyLines.push(`**Curator:** ${curator}`);
                if (pathogen !== '(unknown)') bodyLines.push(`**Pathogen:** ${pathogen}`);
                if (figure !== '(unknown)') bodyLines.push(`**Figure:** ${figure}`);
                if (outcome !== '(unknown)') bodyLines.push(`**Outcome:** ${outcome}`);
                if (notes !== '(unknown)') bodyLines.push(`**Notes:** ${notes}`);
                bodyLines.push(
                  reviewerLine,
                  `**${itemLabel}:** \`${itemPath}\``,
                  '',
                  'This item was seeded into the queue from existing files.',
                  '',
                  claimLine,
                  '',
                  isDirectory ? `<!-- folder: ${itemPath} -->` : null,
                  `<!-- path: ${itemPath} -->`,
                );
                const body = bodyLines.join('\n');

                const created = await github.rest.issues.create({
                  ...context.repo,
                  title: `[REVIEW] ${manuscriptName}`,
                  body,
                  labels: [label],
                });
                core.info(`created issue #${created.data.number} for ${itemPath}`);
              }
            }
